<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e10;
    --surface: #1a1a1e;
    --surface2: #242428;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.14);
    --text: #f0f0f0;
    --text-muted: #6b6b78;
    --accent: #c8f135;
    --accent-dark: #a8d01a;
    --danger: #ff5f5f;
    --op-bg: #222228;
    --op-text: #c8f135;
    --eq-bg: #c8f135;
    --eq-text: #0e0e10;
    --num-bg: #1e1e22;
    --num-hover: #2a2a30;
    --zero-bg: #1e1e22;
    --shadow: 0 24px 80px rgba(0,0,0,0.6);
    --font-display: 'Syne', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-display);
    padding: 2rem;
  }

  .wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
  }

  .label {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-muted);
    font-family: var(--font-mono);
    font-weight: 400;
  }

  .calc {
    width: 340px;
    background: var(--surface);
    border-radius: 28px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    overflow: hidden;
    user-select: none;
  }

  .display {
    padding: 28px 28px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    min-height: 130px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    align-items: flex-end;
    gap: 6px;
    position: relative;
  }

  .display::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(200,241,53,0.15), transparent);
  }

  .expression {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--text-muted);
    min-height: 18px;
    text-align: right;
    word-break: break-all;
    transition: color 0.2s;
  }

  .main-display {
    font-family: var(--font-mono);
    font-size: 48px;
    font-weight: 300;
    color: var(--text);
    text-align: right;
    word-break: break-all;
    line-height: 1;
    transition: font-size 0.15s ease, color 0.2s;
    letter-spacing: -0.02em;
  }

  .main-display.small { font-size: 32px; }
  .main-display.xsmall { font-size: 22px; }
  .main-display.accent { color: var(--accent); }

  .keypad {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--border);
    padding-bottom: 0;
  }

  .btn {
    background: var(--num-bg);
    border: none;
    cursor: pointer;
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 500;
    color: var(--text);
    padding: 0;
    height: 72px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.12s, color 0.12s, transform 0.08s;
    outline: none;
    position: relative;
    overflow: hidden;
  }

  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0);
    transition: background 0.12s;
    border-radius: 0;
  }

  .btn:hover { background: var(--num-hover); }
  .btn:active { transform: scale(0.93); }
  .btn:active::after { background: rgba(255,255,255,0.04); }

  .btn.op {
    background: var(--op-bg);
    color: var(--op-text);
    font-size: 20px;
  }
  .btn.op:hover { background: #2c2c34; }

  .btn.fn {
    background: var(--surface2);
    color: var(--text-muted);
    font-size: 14px;
    letter-spacing: 0.04em;
    font-weight: 500;
  }
  .btn.fn:hover { background: #2e2e34; color: var(--text); }

  .btn.clear {
    background: var(--surface2);
    color: var(--danger);
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.04em;
  }
  .btn.clear:hover { background: rgba(255,95,95,0.12); }

  .btn.eq {
    background: var(--eq-bg);
    color: var(--eq-text);
    font-size: 22px;
    font-weight: 700;
    border-bottom-right-radius: 27px;
  }
  .btn.eq:hover { background: var(--accent-dark); }
  .btn.eq:active { transform: scale(0.92); }

  .btn.zero {
    grid-column: span 2;
    justify-content: flex-start;
    padding-left: 28px;
    background: var(--zero-bg);
    border-bottom-left-radius: 27px;
  }
  .btn.zero:hover { background: var(--num-hover); }

  .btn.dot { font-size: 22px; font-weight: 700; }

  .btn.backspace { font-size: 16px; }

  .history-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px 10px;
    background: var(--surface);
  }

  .history-label {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    font-family: var(--font-mono);
  }

  .history-list {
    display: flex;
    flex-direction: column;
    gap: 0;
    padding: 0 20px 16px;
    background: var(--surface);
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease;
  }

  .history-list.open { max-height: 200px; overflow-y: auto; }

  .history-entry {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-muted);
    text-align: right;
    padding: 4px 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: color 0.15s;
  }
  .history-entry:last-child { border-bottom: none; }
  .history-entry:hover { color: var(--accent); }
  .history-entry span { color: var(--text); }

  .toggle-history {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-muted);
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    transition: color 0.15s;
    padding: 0;
  }
  .toggle-history:hover { color: var(--accent); }

  .kbd-hint {
    font-size: 11px;
    color: var(--text-muted);
    font-family: var(--font-mono);
    letter-spacing: 0.06em;
    opacity: 0.7;
  }

  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 2px; }

  @media (max-width: 400px) {
    .calc { width: 100%; max-width: 340px; }
    body { padding: 1rem; }
  }
</style>
</head>
<body>

<div class="wrapper">
  <p class="label">Calculator</p>

  <div class="calc" id="calc">
    <div class="display">
      <div class="expression" id="expression"></div>
      <div class="main-display" id="mainDisplay">0</div>
    </div>

    <div class="history-bar">
      <span class="history-label">History</span>
      <button class="toggle-history" id="toggleHistory" onclick="toggleHistory()">show ↓</button>
    </div>
    <div class="history-list" id="historyList"></div>

    <div class="keypad">
      <button class="btn clear" onclick="clearAll()">AC</button>
      <button class="btn fn" onclick="toggleSign()">+/−</button>
      <button class="btn fn" onclick="percentage()">%</button>
      <button class="btn op" onclick="setOp('÷')">÷</button>

      <button class="btn" onclick="appendNum('7')">7</button>
      <button class="btn" onclick="appendNum('8')">8</button>
      <button class="btn" onclick="appendNum('9')">9</button>
      <button class="btn op" onclick="setOp('×')">×</button>

      <button class="btn" onclick="appendNum('4')">4</button>
      <button class="btn" onclick="appendNum('5')">5</button>
      <button class="btn" onclick="appendNum('6')">6</button>
      <button class="btn op" onclick="setOp('−')">−</button>

      <button class="btn" onclick="appendNum('1')">1</button>
      <button class="btn" onclick="appendNum('2')">2</button>
      <button class="btn" onclick="appendNum('3')">3</button>
      <button class="btn op" onclick="setOp('+')">+</button>

      <button class="btn zero" onclick="appendNum('0')">0</button>
      <button class="btn dot" onclick="appendDot()">.</button>
      <button class="btn eq" onclick="calculate()">=</button>
    </div>
  </div>

  <p class="kbd-hint">keyboard supported ↵</p>
</div>

<script>
  let current = '0';
  let stored = null;
  let operator = null;
  let justCalc = false;
  let expression = '';
  let history = [];
  let historyOpen = false;

  const mainDisplay = document.getElementById('mainDisplay');
  const expressionEl = document.getElementById('expression');
  const historyList = document.getElementById('historyList');
  const toggleBtn = document.getElementById('toggleHistory');

  function updateDisplay(val, flash) {
    const s = String(val);
    mainDisplay.classList.remove('small', 'xsmall', 'accent');
    if (flash) mainDisplay.classList.add('accent');
    if (s.length > 12) mainDisplay.classList.add('xsmall');
    else if (s.length > 8) mainDisplay.classList.add('small');
    mainDisplay.textContent = s;
  }

  function formatNum(n) {
    if (isNaN(n) || !isFinite(n)) return n;
    const s = parseFloat(n.toPrecision(12));
    return String(s);
  }

  function appendNum(n) {
    if (justCalc) { current = n; expression = ''; justCalc = false; }
    else if (current === '0' && n !== '.') current = n;
    else if (current.length < 15) current += n;
    updateDisplay(current);
  }

  function appendDot() {
    if (justCalc) { current = '0.'; justCalc = false; }
    else if (!current.includes('.')) current += '.';
    updateDisplay(current);
  }

  function setOp(op) {
    if (operator && !justCalc) calculate(true);
    stored = parseFloat(current);
    operator = op;
    expression = current + ' ' + op;
    expressionEl.textContent = expression;
    justCalc = true;
  }

  function calculate(chained) {
    if (operator === null || stored === null) return;
    const a = stored;
    const b = parseFloat(current);
    const fullExpr = expression + ' ' + current;
    let result;
    switch (operator) {
      case '+': result = a + b; break;
      case '−': result = a - b; break;
      case '×': result = a * b; break;
      case '÷': result = b !== 0 ? a / b : 'Error'; break;
    }
    const fmt = result === 'Error' ? 'Error' : formatNum(result);
    if (!chained) {
      expressionEl.textContent = fullExpr + ' =';
      addHistory(fullExpr, fmt);
      operator = null;
      stored = null;
    }
    current = fmt;
    updateDisplay(fmt, !chained);
    justCalc = true;
  }

  function clearAll() {
    current = '0'; stored = null; operator = null;
    justCalc = false; expression = '';
    expressionEl.textContent = '';
    updateDisplay('0');
  }

  function toggleSign() {
    if (current !== '0') {
      current = current.startsWith('-') ? current.slice(1) : '-' + current;
      updateDisplay(current);
    }
  }

  function percentage() {
    current = formatNum(parseFloat(current) / 100);
    updateDisplay(current);
  }

  function addHistory(expr, result) {
    history.unshift({ expr, result });
    if (history.length > 20) history.pop();
    renderHistory();
  }

  function renderHistory() {
    historyList.innerHTML = '';
    if (!history.length) {
      historyList.innerHTML = '<p style="font-family:var(--font-mono);font-size:12px;color:var(--text-muted);text-align:center;padding:8px 0;">No history yet</p>';
      return;
    }
    history.forEach((h, i) => {
      const el = document.createElement('div');
      el.className = 'history-entry';
      el.innerHTML = h.expr + ' = <span>' + h.result + '</span>';
      el.onclick = () => { current = h.result; updateDisplay(h.result); justCalc = true; };
      historyList.appendChild(el);
    });
  }

  function toggleHistory() {
    historyOpen = !historyOpen;
    historyList.classList.toggle('open', historyOpen);
    toggleBtn.textContent = historyOpen ? 'hide ↑' : 'show ↓';
    if (historyOpen) renderHistory();
  }

  document.addEventListener('keydown', e => {
    if (e.key >= '0' && e.key <= '9') appendNum(e.key);
    else if (e.key === '.') appendDot();
    else if (e.key === '+') setOp('+');
    else if (e.key === '-') setOp('−');
    else if (e.key === '*') setOp('×');
    else if (e.key === '/') { e.preventDefault(); setOp('÷'); }
    else if (e.key === 'Enter' || e.key === '=') calculate();
    else if (e.key === 'Escape') clearAll();
    else if (e.key === 'Backspace') {
      if (current.length > 1) current = current.slice(0, -1);
      else current = '0';
      updateDisplay(current);
    }
    else if (e.key === '%') percentage();
  });
</script>
</body>
</html>
